name: GEO Benchmark

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'Manual benchmark run'

jobs:
  benchmark:
    name: Run GEO Benchmark
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: powershell
        run: pip install openai

      - name: Check API key is configured
        shell: powershell
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
          CAAS_BASE_URL: ${{ secrets.CAAS_BASE_URL }}
        run: |
          if (-not $env:CAAS_API_KEY) {
            Write-Host "ERROR: CAAS_API_KEY secret is not set."
            Write-Host "Go to: github.com/tyunugyen/geo-dashboard → Settings → Secrets and variables → Actions → New repository secret"
            Write-Host "Name: CAAS_API_KEY"
            Write-Host "Value: your GoCaaS API key from caas.open-webui.godaddy.com"
            exit 1
          }
          Write-Host "API key is configured (length: $($env:CAAS_API_KEY.Length))"
          $url = if ($env:CAAS_BASE_URL) { $env:CAAS_BASE_URL } else { "<not set, will use fallback>" }
          Write-Host "Base URL configured: $url"

      - name: Run GEO benchmark
        shell: powershell
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
          CAAS_BASE_URL: ${{ secrets.CAAS_BASE_URL }}
        run: python geo_benchmark_runner.py

      - name: Commit and push results
        shell: powershell
        run: |
          git config user.name "GEO Benchmark Bot"
          git config user.email "geo-benchmark@godaddy.com"
          git add public/data.json benchmarks/
          if (git diff --staged --quiet) {
            Write-Host "No changes to commit"
          } else {
            $date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-dd")
            git commit -m "GEO benchmark: $date"
            git push
          }