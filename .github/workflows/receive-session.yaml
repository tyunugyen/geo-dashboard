name: Receive Session from GoCaaS

on:
  repository_dispatch:
    types: [update-session]

jobs:
  update-session:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Update session.json
        run: |
          mkdir -p public/data
          echo '${{ github.event.client_payload.content }}' > public/data/session.json

      - name: Commit and push
        run: |
          git config user.name "GoCaaS Intelligence Bot"
          git config user.email "gocaas-bot@godaddy.com"
          git add public/data/session.json
          git commit -m "Weekly GEO session - W${{ github.event.client_payload.week }} - automated push" || echo "No changes to commit"
          git push
