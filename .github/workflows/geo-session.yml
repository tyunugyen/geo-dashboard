name: GEO Session — Fill Intelligence Layer

on:
  push:
    paths:
      - 'public/data/session.json'
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type override (weekly or monthly)'
        required: false
        default: 'auto'

jobs:
  fill-session:
    runs-on: self-hosted
    if: "!contains(github.event.head_commit.message, '[geo-bot]')"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Python
        shell: pwsh
        run: |
          # Use py launcher (more reliable on Windows)
          py --version
          py -m pip --version

      - name: Install dependencies
        shell: pwsh
        run: py -m pip install openai

      - name: Generate session.json skeleton
        shell: pwsh
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
        run: |
          $RUN_TYPE = "${{ github.event.inputs.run_type }}"
          if ($RUN_TYPE -eq "monthly") {
            Write-Host "Generating MONTHLY session.json skeleton..."
            py generate_session_json.py --monthly
          } else {
            Write-Host "Generating WEEKLY session.json skeleton..."
            py generate_session_json.py --weekly
          }
          Write-Host ""
          Write-Host "Skeleton generated. Preview:"
          py -c "import json; s=json.load(open('public/data/session.json')); m=s.get('meta',{}); print(f'  run_type: {m.get(''run_type'')}'); print(f'  run_id: {m.get(''run_id'')}'); print(f'  unaided_sov: {s.get(''sov_dashboard'',{}).get(''unaided_sov'',{}).get(''value'')}')"

      - name: Fill session.json via Claude API
        shell: pwsh
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
        run: py fill_session.py

      - name: Validate output
        shell: pwsh
        run: |
          py -c @"
          import json, sys
          with open('public/data/session.json') as f:
              s = json.load(f)
          errors = []
          if not isinstance(s.get('build_pages'), list):
              errors.append('build_pages missing')
          if not s.get('competitive_intel'):
              errors.append('competitive_intel empty')
          if not s.get('report_summary', {}).get('binding_constraint'):
              errors.append('report_summary.binding_constraint missing')
          if errors:
              print('VALIDATION ERRORS:', errors)
              sys.exit(1)
          print('Validation passed')
          print('  build_pages:  ', len(s.get('build_pages', [])))
          print('  amplify:      ', len(s.get('amplify_threads', [])))
          print('  cite_pipeline:', len(s.get('cite_pipeline', [])))
          print('  perplexity:   ', len(s.get('perplexity_simulation', [])))
          EOF

      - name: Commit completed session.json
        run: |
          git config user.name  "GEO Bot"
          git config user.email "geo-bot@users.noreply.github.com"
          git add public/data/session.json
          python - <<'EOF'
          import json
          with open('public/data/session.json') as f:
              s = json.load(f)
          print(s['meta']['run_id'])
          EOF
          RUN_ID=$(python - <<'EOF'
          import json
          with open('public/data/session.json') as f:
              s = json.load(f)
          print(s['meta']['run_id'])
          EOF
          )
          git diff --staged --quiet || git commit -m "[geo-bot] GEO session complete — ${RUN_ID}"
          git push