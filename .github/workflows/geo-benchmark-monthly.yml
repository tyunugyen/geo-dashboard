name: GEO Monthly Benchmark

on:
  schedule:
    - cron: '0 10 1 * *'  # First day of month, 10am UTC (3am PDT)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why running monthly benchmark?'
        required: false
        default: 'Manual monthly benchmark'

jobs:
  benchmark:
    name: Run Monthly 8-Model Benchmark
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure git safe directory
        shell: cmd
        run: git config --global --add safe.directory C:/actions-runner/_work/geo-dashboard/geo-dashboard

      - name: Install dependencies
        shell: cmd
        run: C:\Users\tyunguyen\AppData\Local\Python\bin\python.exe -m pip install openai

      - name: Check API key
        shell: cmd
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
        run: |
          if not defined CAAS_API_KEY (
            echo ERROR: CAAS_API_KEY not set
            exit /b 1
          )
          echo API key configured

      - name: Run 8-model benchmark
        shell: cmd
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
          CAAS_BASE_URL: ${{ secrets.CAAS_BASE_URL }}
        run: |
          echo Running MONTHLY official benchmark with 8 models
          C:\Users\tyunguyen\AppData\Local\Python\bin\python.exe geo_benchmark_multi_model.py --models all

      - name: Update dashboard with monthly data
        shell: cmd
        run: C:\Users\tyunguyen\AppData\Local\Python\bin\python.exe update_dashboard.py --frequency monthly

      - name: Generate session.json (GoCaaS intelligence layer)
        shell: cmd
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
          CAAS_BASE_URL: ${{ secrets.CAAS_BASE_URL }}
        run: |
          echo Generating session.json with GoCaaS intelligence
          C:\Users\tyunguyen\AppData\Local\Python\bin\python.exe generate_session_json.py --monthly

      - name: Commit and push results
        shell: cmd
        run: |
          git config user.name "GEO Benchmark Bot"
          git config user.email "geo-benchmark@godaddy.com"
          git add public/data_monthly.json public/data/session.json benchmarks/
          git diff --cached --quiet
          if errorlevel 1 (
            for /f %%i in ('powershell -Command "Get-Date -Format yyyy-MM"') do set DATE=%%i
            git commit -m "GEO monthly benchmark: %DATE% | Full 5-model official benchmark"
            git push
          ) else (
            echo No changes to commit
          )
