name: GEO Session — Fill Intelligence Layer

on:
  push:
    paths:
      - 'public/data/session.json'
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type override (weekly or monthly)'
        required: false
        default: 'auto'

jobs:
  fill-session:
    runs-on: self-hosted
    if: "!contains(github.event.head_commit.message, '[geo-bot]')"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test CaaS connectivity
        shell: powershell -ExecutionPolicy Bypass -Command "& {{0}}"
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
        run: |
          Write-Host "Testing CaaS proxy connectivity..."
          try {
            $headers = @{
              "Authorization" = "Bearer $env:CAAS_API_KEY"
              "Content-Type" = "application/json"
            }
            $body = '{"model":"claude-sonnet-4-6","max_tokens":10,"messages":[{"role":"user","content":"Say OK"}]}'
            $response = Invoke-WebRequest -Uri "https://caas-gocode-prod.caas-prod.prod.onkatana.net/chat/completions" -Method POST -Headers $headers -Body $body -TimeoutSec 30
            Write-Host "[OK] CaaS reachable - status: $($response.StatusCode)"
          } catch {
            Write-Host "[ERROR] CaaS UNREACHABLE: $_" -ForegroundColor Red
            Write-Host "Runner cannot reach CaaS proxy - check VPN/network" -ForegroundColor Red
            exit 1
          }

      - name: Install dependencies
        shell: powershell -ExecutionPolicy Bypass -Command "& {{0}}"
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Installing openai package..."
          py -m pip install openai
          if ($LASTEXITCODE -ne 0) { throw "pip install failed" }

      - name: Show session.json run type
        shell: powershell -ExecutionPolicy Bypass -Command "& {{0}}"
        run: |
          $s = Get-Content 'public/data/session.json' | ConvertFrom-Json
          Write-Host "run_type : $($s.meta.run_type)"
          Write-Host "run_id   : $($s.meta.run_id)"
          Write-Host "updated  : $($s.meta.last_updated)"
          Write-Host "build_pages: $($s.build_pages.Count)"
          Write-Host "amplify  : $($s.amplify_threads.Count)"

      - name: Test environment variable
        shell: powershell -ExecutionPolicy Bypass -Command "& {{0}}"
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
        run: |
          $env:CAAS_API_KEY = "${{ secrets.CAAS_API_KEY }}"
          Write-Host "Testing Python environment variable access..."
          py test_env.py
          if ($LASTEXITCODE -ne 0) { throw "Environment variable test failed" }

      - name: Fill session.json via Claude API
        shell: powershell -ExecutionPolicy Bypass -Command "& {{0}}"
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
        run: |
          $ErrorActionPreference = "Stop"
          # Explicitly set env var for Python subprocess
          $env:CAAS_API_KEY = "${{ secrets.CAAS_API_KEY }}"
          Write-Host "Filling session.json via Claude API..."
          Write-Host "API key set: $($env:CAAS_API_KEY.Length) chars"

          # Capture output and show it
          $output = py fill_session.py 2>&1
          $output | ForEach-Object { Write-Host $_ }

          if ($LASTEXITCODE -ne 0) {
            Write-Host "ERROR: fill_session.py failed with exit code $LASTEXITCODE" -ForegroundColor Red
            throw "fill_session.py failed"
          }
          Write-Host "Fill script completed successfully"

      - name: Validate output
        shell: powershell -ExecutionPolicy Bypass -Command "& {{0}}"
        run: |
          $s = Get-Content 'public/data/session.json' | ConvertFrom-Json
          $errors = @()
          if (-not $s.competitive_intel) { $errors += "competitive_intel empty" }
          if (-not $s.report_summary.binding_constraint) { $errors += "report_summary.binding_constraint missing" }
          if ($errors.Count -gt 0) {
            Write-Host "VALIDATION ERRORS: $errors"
            exit 1
          }
          Write-Host "Validation passed"
          Write-Host "build_pages:   $($s.build_pages.Count)"
          Write-Host "amplify:       $($s.amplify_threads.Count)"
          Write-Host "cite_pipeline: $($s.cite_pipeline.Count)"
          Write-Host "perplexity:    $($s.perplexity_simulation.Count)"

      - name: Commit completed session.json
        shell: powershell -ExecutionPolicy Bypass -Command "& {{0}}"
        run: |
          Write-Host "=== Commit Step Debug ==="
          Write-Host "Working directory: $(Get-Location)"
          Write-Host "File exists: $(Test-Path 'public/data/session.json')"
          Write-Host "File size: $((Get-Item 'public/data/session.json').Length) bytes"

          git config user.name "GEO Bot"
          git config user.email "geo-bot@users.noreply.github.com"

          Write-Host "`nGit status before add:"
          git status --short public/data/session.json

          git add public/data/session.json

          Write-Host "`nGit staged files:"
          git diff --staged --name-only

          Write-Host "`nGit diff stat:"
          git diff --staged --shortstat

          $s = Get-Content 'public/data/session.json' | ConvertFrom-Json
          $runId = $s.meta.run_id
          Write-Host "`nRun ID: $runId"

          $diff = git diff --staged --name-only
          if ($diff) {
            Write-Host "`nCreating commit..."
            git commit -m "[geo-bot] GEO session complete — $runId"
            Write-Host "Pushing to origin..."
            git push
            Write-Host "✅ Committed and pushed"
          } else {
            Write-Host "`n⚠️  No staged changes - session.json was not modified by fill step"
          }
