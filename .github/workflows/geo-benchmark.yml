name: GEO Benchmark

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'Manual benchmark run'

jobs:
  benchmark:
    name: Run GEO Benchmark
    runs-on: self-hosted

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        shell: cmd
        run: C:\Users\tyunguyen\AppData\Local\Python\bin\python.exe -m pip install openai

      - name: Check API key is configured
        shell: cmd
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
          CAAS_BASE_URL: ${{ secrets.CAAS_BASE_URL }}
        run: |
          if not defined CAAS_API_KEY (
            echo ERROR: CAAS_API_KEY secret is not set.
            echo Go to: github.com/tyunugyen/geo-dashboard - Settings - Secrets and variables - Actions - New repository secret
            echo Name: CAAS_API_KEY
            echo Value: your GoCaaS API key from caas.open-webui.godaddy.com
            exit /b 1
          )
          echo API key is configured
          if defined CAAS_BASE_URL (echo Base URL configured: %CAAS_BASE_URL%) else (echo Base URL: will use fallback)

      - name: Run GEO benchmark
        shell: cmd
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
          CAAS_BASE_URL: ${{ secrets.CAAS_BASE_URL }}
        run: C:\Users\tyunguyen\AppData\Local\Python\bin\python.exe geo_benchmark_runner.py

      - name: Commit and push results
        shell: cmd
        run: |
          git config user.name "GEO Benchmark Bot"
          git config user.email "geo-benchmark@godaddy.com"
          git add public/data.json benchmarks/
          git diff --staged --quiet
          if errorlevel 1 (
            for /f %%i in ('powershell -Command "Get-Date -Format yyyy-MM-dd"') do set DATE=%%i
            git commit -m "GEO benchmark: %DATE%"
            git push
          ) else (
            echo No changes to commit
          )