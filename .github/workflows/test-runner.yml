name: Test Self-Hosted Runner

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Test Python with PowerShell
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Write-Host "Testing Python..."
          py --version
          if ($LASTEXITCODE -ne 0) { throw "py failed" }
          Write-Host "Python location:"
          py -c "import sys; print(sys.executable)"
          if ($LASTEXITCODE -ne 0) { throw "py -c failed" }
          Write-Host "Pip version:"
          py -m pip --version
          if ($LASTEXITCODE -ne 0) { throw "pip failed" }
          Write-Host "Current directory:"
          Get-Location
          Write-Host "Files in public/data:"
          if (Test-Path "public/data") { Get-ChildItem public/data | Select-Object Name }
          Write-Host "TEST PASSED!"
