name: GEO Benchmark

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 9am UTC
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this manually?'
        required: false
        default: 'Manual benchmark run'

jobs:
  benchmark:
    name: Run GEO Benchmark
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openai

      # Check the secret is set before running — gives a clear error if missing
      - name: Check API key is configured
        run: |
          if [ -z "$CAAS_API_KEY" ]; then
            echo "ERROR: CAAS_API_KEY secret is not set."
            echo "Go to: github.com/tyunugyen/geo-dashboard → Settings → Secrets and variables → Actions → New repository secret"
            echo "Name: CAAS_API_KEY"
            echo "Value: your GoCaaS API key from caas.open-webui.godaddy.com"
            exit 1
          fi
          echo "API key is configured (length: ${#CAAS_API_KEY})"
        env:
          env:
            CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
            CAAS_BASE_URL: ${{ secrets.CAAS_BASE_URL }}

      - name: Run GEO benchmark
        env:
          CAAS_API_KEY: ${{ secrets.CAAS_API_KEY }}
          CAAS_BASE_URL: ${{ secrets.CAAS_BASE_URL }}
        run: python geo_benchmark_runner.py

      - name: Commit and push results
        run: |
          git config user.name  "GEO Benchmark Bot"
          git config user.email "geo-benchmark@godaddy.com"
          git add public/data.json benchmarks/
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "GEO benchmark: $(date -u +%Y-%m-%d)"
          git push
